version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: glttravel
      POSTGRES_USER: gltuser
      POSTGRES_PASSWORD: gltpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gltuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://gltuser:gltpassword@db:5432/glttravel
      SECRET_KEY: your-production-secret-key-change-this
      JWT_SECRET_KEY: your-jwt-secret-key-change-this
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app/uploads:/app/uploads
    command: gunicorn --bind 0.0.0.0:5000 run:app

volumes:
  postgres_data: