# render.yaml — place in ROOT of your repo

services:
  - type: web
    name: glt-travel-backend
    runtime: python
    rootDir: backend
    # Pin Python to 3.11 — stable, widely supported, psycopg2 works perfectly
    pythonVersion: 3.11.9
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python -m flask db upgrade
    startCommand: gunicorn wsgi:application --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: glt-travel-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://YOUR_VERCEL_APP.vercel.app

databases:
  - name: glt-travel-db
    databaseName: glttravel
    user: glttravel_user
    plan: free