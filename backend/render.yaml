# render.yaml — place in the ROOT of your repo
# Render reads this file and auto-configures your services.

services:
  # ── Flask Backend (Web Service) ────────────────────────────────────────────
  - type: web
    name: glt-travel-backend
    runtime: python
    rootDir: backend                       # folder where your Flask app lives
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      flask db upgrade
    startCommand: gunicorn wsgi:application --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: SECRET_KEY
        generateValue: true                # Render auto-generates a secure value
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: glt-travel-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://YOUR_VERCEL_APP.vercel.app   # update after Vercel deploy
      - key: PYTHON_VERSION
        value: "3.11.0"

# ── PostgreSQL Database ────────────────────────────────────────────────────────
databases:
  - name: glttravel
    databaseName: glttravel
    user: glttravel_admin
    plan: free                             # free tier: 1GB, 90-day limit